  <title>MangoBob & Jeff: Rotten Mango King</title>

<body>
  <div id="game-container"></div>

    <strong>MangoBob</strong>: WASD move &middot; SPACE mango club &middot; E throw mango &middot; F bazooka &middot; SHIFT dodge<br />

  </div>
